<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="480" height="480" role="img" aria-labelledby="title1">
  <title id="title1">Cute potato character</title>
  <!-- potato body -->
  <ellipse cx="120" cy="130" rx="88" ry="68" fill="#D69A56" stroke="#9C6A33" stroke-width="4"/>
  <!-- spots -->
  <ellipse cx="90" cy="110" rx="8" ry="5" fill="#A36A3E" opacity="0.9"/>
  <ellipse cx="140" cy="95" rx="10" ry="6" fill="#A36A3E" opacity="0.9"/>
  <ellipse cx="125" cy="150" rx="6" ry="4" fill="#A36A3E" opacity="0.9"/>
  <!-- eyes -->
  <circle cx="95" cy="120" r="10" fill="#fff"/>
  <circle cx="145" cy="120" r="10" fill="#fff"/>
  <circle cx="97" cy="122" r="4" fill="#2b2b2b"/>
  <circle cx="147" cy="122" r="4" fill="#2b2b2b"/>
  <!-- blush -->
  <ellipse cx="85" cy="138" rx="12" ry="6" fill="#FFC0C0" opacity="0.7"/>
  <ellipse cx="155" cy="138" rx="12" ry="6" fill="#FFC0C0" opacity="0.7"/>
  <!-- smile -->
  <path d="M95 150 Q120 165 145 150" stroke="#6B3E1A" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
