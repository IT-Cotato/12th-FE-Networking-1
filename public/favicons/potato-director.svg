<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="640" height="480" role="img" aria-labelledby="title3">
  <title id="title3">Potato director with clapperboard</title>
  <!-- body -->
  <ellipse cx="160" cy="130" rx="95" ry="75" fill="#E0A46A" stroke="#8B5A2A" stroke-width="4"/>
  <!-- eyes -->
  <circle cx="130" cy="120" r="10" fill="#fff"/>
  <circle cx="190" cy="120" r="10" fill="#fff"/>
  <circle cx="132" cy="122" r="4.5" fill="#1f1f1f"/>
  <circle cx="192" cy="122" r="4.5" fill="#1f1f1f"/>
  <!-- smile -->
  <path d="M135 152 Q160 170 185 152" stroke="#6B3E1A" stroke-width="4" fill="none"/>
  <!-- director hat -->
  <rect x="110" y="84" width="100" height="18" rx="6" fill="#111"/>
  <rect x="142" y="66" width="56" height="22" rx="6" fill="#111"/>
  <!-- clapperboard -->
  <g transform="translate(30,40) rotate(-18)">
    <rect x="160" y="90" width="110" height="66" rx="6" fill="#0e0e0e" stroke="#222" stroke-width="3"/>
    <path d="M160 90 L270 90 L235 116 L160 116 Z" fill="#222" stroke="#444" stroke-width="1"/>
    <path d="M160 90 L270 90" stroke="#fff" stroke-width="6" stroke-dasharray="12 8"/>
  </g>
  <!-- arm holding clapper -->
  <path d="M220 145 C245 130 265 120 292 105" stroke="#8B5A2A" stroke-width="10" stroke-linecap="round" fill="none"/>
</svg>
