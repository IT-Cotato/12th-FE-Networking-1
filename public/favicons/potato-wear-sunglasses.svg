<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240" width="520" height="480" role="img" aria-labelledby="title4">
  <title id="title4">Cool potato with film-strip sunglasses</title>
  <!-- body -->
  <ellipse cx="130" cy="130" rx="90" ry="70" fill="#DCA66A" stroke="#8A5B2A" stroke-width="4"/>
  <!-- film-strip sunglasses -->
  <rect x="84" y="110" width="96" height="30" rx="6" fill="#111"/>
  <rect x="86" y="114" width="20" height="22" rx="2" fill="#222"/>
  <rect x="110" y="114" width="20" height="22" rx="2" fill="#222"/>
  <rect x="134" y="114" width="20" height="22" rx="2" fill="#222"/>
  <rect x="158" y="114" width="20" height="22" rx="2" fill="#222"/>
  <!-- white holes in film -->
  <circle cx="96" cy="125" r="3.2" fill="#fff"/>
  <circle cx="117" cy="125" r="3.2" fill="#fff"/>
  <circle cx="138" cy="125" r="3.2" fill="#fff"/>
  <circle cx="160" cy="125" r="3.2" fill="#fff"/>
  <!-- mouth -->
  <path d="M115 155 Q130 170 145 155" stroke="#6B3E1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- popcorn-ish shine -->
  <ellipse cx="110" cy="100" rx="8" ry="5" fill="#A86B3A" opacity="0.9"/>
  <ellipse cx="150" cy="100" rx="6" ry="4" fill="#A86B3A" opacity="0.9"/>
</svg>
