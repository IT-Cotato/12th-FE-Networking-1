<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="600" height="480" role="img" aria-labelledby="title2">
  <title id="title2">Potato character holding popcorn (scaled)</title>
  <g transform="scale(1.4) translate(-45,-35)">
    <!-- body -->
    <ellipse cx="150" cy="130" rx="95" ry="75" fill="#D99B56" stroke="#8C5A2B" stroke-width="4"/>
    <!-- spots -->
    <ellipse cx="120" cy="110" rx="9" ry="6" fill="#A36A3E"/>
    <ellipse cx="170" cy="100" rx="7" ry="5" fill="#A36A3E"/>
    <!-- eyes -->
    <circle cx="120" cy="120" r="11" fill="#fff"/>
    <circle cx="180" cy="120" r="11" fill="#fff"/>
    <circle cx="122" cy="122" r="4.5" fill="#231815"/>
    <circle cx="182" cy="122" r="4.5" fill="#231815"/>
    <!-- smile -->
    <path d="M125 150 Q150 168 175 150" stroke="#5B3616" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- left arm holding popcorn -->
    <path d="M90 150 C70 150 70 170 95 180" stroke="#8C5A2B" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- popcorn bucket -->
    <rect x="92" y="170" width="56" height="46" rx="6" fill="#fff" stroke="#B10E12" stroke-width="4"/>
    <path d="M92 170 L120 150 L148 170 Z" fill="#fff" stroke="#B10E12" stroke-width="3"/>
    <!-- popcorn pieces -->
    <circle cx="116" cy="160" r="6" fill="#FFDFA4"/>
    <circle cx="104" cy="176" r="6" fill="#FFDFA4"/>
    <circle cx="132" cy="174" r="6" fill="#FFDFA4"/>
    <!-- right arm -->
    <path d="M210 150 C230 150 230 170 205 180" stroke="#8C5A2B" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>
</svg>
